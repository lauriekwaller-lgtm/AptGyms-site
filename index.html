<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AptGyms | Nationwide Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAFkTTvHfnSFqUC-ClOj-rKBqVz_cr2WSU",
            authDomain: "aptgyms.firebaseapp.com",
            projectId: "aptgyms",
            storageBucket: "aptgyms.firebasestorage.app",
            messagingSenderId: "895660741409",
            appId: "1:895660741409:web:3f53bc334016bab0d0a460",
            measurementId: "G-BP6824CQSQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let gyms = [];
        let view = 'directory';

        window.onload = () => {
            signInAnonymously(auth).then(() => {
                onSnapshot(collection(db, 'gyms'), (snap) => {
                    gyms = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    render();
                });
            });
        };

        window.toggleView = () => { view = view === 'directory' ? 'admin' : 'directory'; render(); };
        window.addGym = () => {
            const name = prompt("Building Name:");
            if(name) addDoc(collection(db, 'gyms'), { name, city: 'Arlington', totalScore: 85, createdAt: serverTimestamp() });
        };

        function render() {
            document.getElementById('app').innerHTML = `
                <div class="max-w-md mx-auto p-6">
                    <div class="flex justify-between items-center mb-8">
                        <h1 class="text-3xl font-black italic italic uppercase tracking-tighter">AptGyms.</h1>
                        <button onclick="toggleView()" class="bg-black text-white px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">
                            ${view === 'directory' ? 'Manage' : 'Back'}
                        </button>
                    </div>
                    ${view === 'directory' ? 
                        gyms.map(g => `<div class="bg-white p-6 rounded-[2rem] shadow-sm mb-4 border border-slate-100">
                            <h3 class="text-xl font-black italic">${g.name}</h3>
                            <p class="text-orange-500 font-black text-xs uppercase tracking-widest">${g.totalScore} Score</p>
                        </div>`).join('') :
                        `<button onclick="addGym()" class="w-full py-8 border-2 border-dashed border-slate-200 rounded-[2rem] text-slate-400 font-black uppercase tracking-widest">Add Audit</button>`
                    }
                </div>
            `;
        }
    </script>
</head>
<body class="bg-slate-50">
    <div id="app"></div>
</body>
</html>
